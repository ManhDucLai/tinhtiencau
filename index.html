<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="Ứng dụng tính tiền cầu lông tiện lợi, chia đều tiền sân và tiền cầu nhanh chóng cho các nhóm chơi.">
    <title>Tính Tiền Cầu Lông</title>
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🏸</text></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #f3f4f6;
            overflow-x: hidden;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
        }

        input[type=number]::-webkit-inner-spin-button,
        input[type=number]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        input[type=number] {
            appearance: textfield;
            -moz-appearance: textfield;
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center p-0 sm:p-4">

    <div class="glass-panel w-full min-h-screen sm:min-h-0 sm:max-w-md sm:rounded-2xl shadow-xl flex flex-col p-5 sm:p-6">

        <!-- Header -->
      

        <div class="space-y-4 flex-grow">
            <div>
                <label class="block text-gray-700 text-xs sm:text-sm font-bold mb-1.5">Tiền Sân (VNĐ):</label>
                <input type="text" inputmode="numeric" id="tienSan"
                    class="w-full px-4 py-3 text-lg border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 shadow-sm transition"
                    placeholder="Nhập tiền sân" oninput="xuLyNhapLieu(this, 'sugTienSan', true)"
                    onfocus="hienGoiYTienSan(this)">
                <div id="sugTienSan" class="hidden mt-2 transition-all"></div>
            </div>

            <div>
                <div class="flex justify-between items-center mb-1.5">
                    <label class="block text-gray-700 text-xs sm:text-sm font-bold">Giá 1 Ống Cầu (VNĐ):</label>
                    <select id="loaiOngCau"
                        class="text-xs border border-gray-300 rounded-lg px-2 py-1 focus:outline-none focus:ring-2 focus:ring-blue-500 bg-white shadow-sm font-medium">
                        <option value="12">Loại 12 quả</option>
                        <option value="10" selected>Loại 10 quả</option>
                    </select>
                </div>
                <input type="text" inputmode="numeric" id="giaOngCau"
                    class="w-full px-4 py-3 text-lg border border-gray-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 shadow-sm transition"
                    placeholder="Nhập giá 1 ống cầu" oninput="xuLyNhapLieu(this, 'sugGiaCau', false)">
                <div id="sugGiaCau" class="hidden mt-2 transition-all"></div>
            </div>

            <div>
                <label class="block text-gray-700 text-xs sm:text-sm font-bold mb-1.5">Số Quả Cầu Đã Dùng:</label>
                <div class="flex items-center">
                    <button type="button" onclick="thayDoiSoLuong('soCauDung', -1)"
                        class="w-12 h-12 flex items-center justify-center bg-gray-50 hover:bg-gray-100 active:bg-gray-200 text-gray-600 font-bold rounded-l-xl border-y border-l border-gray-300 transition text-lg select-none">
                        -
                    </button>
                    <input type="number" inputmode="numeric" pattern="[0-9]*" id="soCauDung"
                        class="flex-grow h-12 text-center text-lg border-y border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:z-10 shadow-sm"
                        placeholder="VD: 6" value="0">
                    <button type="button" onclick="thayDoiSoLuong('soCauDung', 1)"
                        class="w-12 h-12 flex items-center justify-center bg-gray-50 hover:bg-gray-100 active:bg-gray-200 text-gray-600 font-bold rounded-r-xl border-y border-r border-gray-300 transition text-lg select-none">
                        +
                    </button>
                </div>
            </div>

            <div>
                <label class="block text-gray-700 text-xs sm:text-sm font-bold mb-1.5">Số Người Chơi:</label>
                <div class="flex items-center">
                    <button type="button" onclick="thayDoiSoLuong('soNguoi', -1, 1)"
                        class="w-12 h-12 flex items-center justify-center bg-gray-50 hover:bg-gray-100 active:bg-gray-200 text-gray-600 font-bold rounded-l-xl border-y border-l border-gray-300 transition text-lg select-none">
                        -
                    </button>
                    <input type="number" inputmode="numeric" pattern="[0-9]*" id="soNguoi"
                        class="flex-grow h-12 text-center text-lg border-y border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:z-10 shadow-sm"
                        placeholder="VD: 4" value="" min="1">
                    <button type="button" onclick="thayDoiSoLuong('soNguoi', 1, 1)"
                        class="w-12 h-12 flex items-center justify-center bg-gray-50 hover:bg-gray-100 active:bg-gray-200 text-gray-600 font-bold rounded-r-xl border-y border-r border-gray-300 transition text-lg select-none">
                        +
                    </button>
                </div>
            </div>

            <button onclick="tinhTien()"
                class="w-full bg-blue-600 hover:bg-blue-700 active:bg-blue-800 text-white font-bold py-3.5 px-4 rounded-xl transition duration-200 mt-4 shadow-md text-lg">
                Tính tiền
            </button>
        </div>

        <div id="ketQuaBox"
            class="mt-6 hidden bg-white border border-blue-100 rounded-2xl p-5 mb-4 sm:mb-0 shadow-lg relative overflow-hidden transition-all duration-300">
            <div class="absolute top-0 right-0 bg-blue-500 text-white text-[9px] uppercase font-bold tracking-wider px-2.5 py-0.5 rounded-bl-lg">
                Kết quả
            </div>
            
            <div class="space-y-2.5">
                <div class="flex justify-between items-center text-sm border-b border-gray-50 pb-2">
                    <span class="text-gray-500">🏟️ Tiền sân:</span>
                    <span class="font-semibold text-gray-800"><span id="kqTienSan">0</span> VNĐ</span>
                </div>
                <div class="flex justify-between items-center text-sm border-b border-gray-50 pb-2">
                    <span class="text-gray-500">🏸 Tổng tiền cầu:</span>
                    <span class="font-semibold text-gray-800"><span id="tongTienCau">0</span> VNĐ</span>
                </div>
                <div class="flex justify-between items-center text-sm border-b border-gray-50 pb-2">
                    <span class="text-gray-500">💰 Tổng chi phí:</span>
                    <span class="font-bold text-gray-900"><span id="tongChiPhi">0</span> VNĐ</span>
                </div>
                
                <div class="pt-2.5 text-center">
                    <p class="text-[10px] text-gray-400 uppercase tracking-wider font-semibold">Mỗi người đóng</p>
                    <p id="tienMoiNguoi" class="text-3xl sm:text-4xl font-black text-blue-600 mt-0.5 drop-shadow-sm">0 <span class="text-base font-bold">VNĐ</span></p>
                    <p class="text-[10px] text-gray-400 mt-1.5 italic">* Đã làm tròn lên hàng nghìn</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Tăng giảm số lượng (stepper) nhanh chóng cho mobile
        function thayDoiSoLuong(id, diff, minVal = 0) {
            let input = document.getElementById(id);
            let val = parseInt(input.value, 10);
            if (isNaN(val)) val = 0;
            let newVal = val + diff;
            if (newVal < minVal) newVal = minVal;
            input.value = newVal;
        }

        // Hiển thị gợi ý tiền sân cố định theo số giờ (được tối ưu layout lưới 4 cột trên di động)
        function hienGoiYTienSan(inputElement) {
            let sugBox = document.getElementById('sugTienSan');
            sugBox.innerHTML = `
                <div class="grid grid-cols-4 gap-1.5">
                    <button type="button" onclick="chonGoiY('${inputElement.id}', '100.000', 'sugTienSan')" 
                        class="flex flex-col items-center justify-center py-2 px-1 rounded-xl bg-blue-50 text-blue-700 font-semibold border border-blue-200 shadow-sm active:bg-blue-300 hover:bg-blue-200 transition">
                        <span class="text-gray-500 text-[10px] mb-0.5">⏱️ 1h</span>
                        <span class="font-bold text-xs sm:text-sm">100k</span>
                    </button>
                    <button type="button" onclick="chonGoiY('${inputElement.id}', '200.000', 'sugTienSan')" 
                        class="flex flex-col items-center justify-center py-2 px-1 rounded-xl bg-blue-50 text-blue-700 font-semibold border border-blue-200 shadow-sm active:bg-blue-300 hover:bg-blue-200 transition">
                        <span class="text-gray-500 text-[10px] mb-0.5">⏱️ 2h</span>
                        <span class="font-bold text-xs sm:text-sm">200k</span>
                    </button>
                    <button type="button" onclick="chonGoiY('${inputElement.id}', '300.000', 'sugTienSan')" 
                        class="flex flex-col items-center justify-center py-2 px-1 rounded-xl bg-blue-50 text-blue-700 font-semibold border border-blue-200 shadow-sm active:bg-blue-300 hover:bg-blue-200 transition">
                        <span class="text-gray-500 text-[10px] mb-0.5">⏱️ 3h</span>
                        <span class="font-bold text-xs sm:text-sm">300k</span>
                    </button>
                    <button type="button" onclick="chonGoiY('${inputElement.id}', '400.000', 'sugTienSan')" 
                        class="flex flex-col items-center justify-center py-2 px-1 rounded-xl bg-blue-50 text-blue-700 font-semibold border border-blue-200 shadow-sm active:bg-blue-300 hover:bg-blue-200 transition">
                        <span class="text-gray-500 text-[10px] mb-0.5">⏱️ 4h</span>
                        <span class="font-bold text-xs sm:text-sm">400k</span>
                    </button>
                </div>`;
            sugBox.classList.remove('hidden');
        }

        // Hàm vừa tạo dấu chấm khi gõ, vừa hiển thị gợi ý
        function xuLyNhapLieu(inputElement, sugId, isTienSan = false) {
            let rawValue = inputElement.value.replace(/\D/g, ''); // Lọc lấy số
            let sugBox = document.getElementById(sugId);

            // Nếu ô trống thì ẩn gợi ý (hoặc hiện gợi ý tiền sân nếu là ô tiền sân)
            if (!rawValue) {
                inputElement.value = '';
                if (isTienSan) {
                    hienGoiYTienSan(inputElement);
                } else {
                    sugBox.classList.add('hidden');
                }
                return;
            }

            // Tự động thêm dấu chấm ngăn cách hàng nghìn khi gõ
            let num = parseInt(rawValue, 10);
            inputElement.value = num.toLocaleString('vi-VN');

            // Hiển thị gợi ý cho mọi số > 0
            if (num > 0) {
                if (isTienSan) {
                    hienGoiYTienSan(inputElement);
                } else {
                    let suggestions = [];
                    // Thử tất cả các mức nhân hợp lý cho giá ống cầu
                    [1000, 10000, 100000].forEach(multiplier => {
                        let suggested = num * multiplier;
                        if (suggested > num && suggested <= 990000) suggestions.push(suggested);
                    });

                    // Xóa trùng lặp
                    suggestions = [...new Set(suggestions)];

                    // Tạo nút bấm gợi ý
                    sugBox.innerHTML = `
                        <div class="flex flex-wrap gap-2">
                            ${suggestions.map(val => `
                                <button type="button" onclick="chonGoiY('${inputElement.id}', '${val.toLocaleString('vi-VN')}', '${sugId}')" 
                                    class="inline-flex items-center text-xs bg-blue-50 text-blue-700 font-semibold px-3 py-1.5 rounded-lg border border-blue-200 shadow-sm active:bg-blue-300 hover:bg-blue-200 transition">
                                    ✨ ${val.toLocaleString('vi-VN')}
                                </button>
                            `).join('')}
                        </div>`;
                    sugBox.classList.remove('hidden');
                }
            } else {
                if (isTienSan) {
                    hienGoiYTienSan(inputElement);
                } else {
                    sugBox.classList.add('hidden');
                }
            }
        }

        // Hàm áp dụng gợi ý khi người dùng bấm vào nút
        function chonGoiY(inputId, formattedValue, sugId) {
            document.getElementById(inputId).value = formattedValue;
            document.getElementById(sugId).classList.add('hidden');
        }

        function tinhTien() {
            // Tắt bàn phím ảo trên điện thoại để trải nghiệm xem kết quả tốt hơn
            if (document.activeElement) {
                document.activeElement.blur();
            }

            // Lấy dữ liệu và bỏ dấu chấm đi để tính toán
            const tienSanStr = document.getElementById('tienSan').value.replace(/\D/g, '');
            const giaOngCauStr = document.getElementById('giaOngCau').value.replace(/\D/g, '');

            const tienSan = parseFloat(tienSanStr) || 0;
            const giaOngCau = parseFloat(giaOngCauStr) || 0;
            const soCauDung = parseFloat(document.getElementById('soCauDung').value) || 0;
            const soNguoi = parseInt(document.getElementById('soNguoi').value) || 1;
            const loaiOngCau = parseInt(document.getElementById('loaiOngCau').value) || 10;

            // Tính tiền cầu
            const giaMotQua = giaOngCau / loaiOngCau;
            const tongTienCau = giaMotQua * soCauDung;

            // Tổng tiền và chia đều
            const tongTien = tienSan + tongTienCau;
            const chiaDeu = tongTien / soNguoi;

            // Làm tròn LÊN hàng nghìn (VD: 43.215 -> 44.000)
            const tienLamTron = Math.ceil(chiaDeu / 1000) * 1000;

            // Hiển thị dữ liệu lên màn hình
            document.getElementById('kqTienSan').innerText = tienSan.toLocaleString('vi-VN');
            document.getElementById('tongTienCau').innerText = Math.round(tongTienCau).toLocaleString('vi-VN');
            document.getElementById('tongChiPhi').innerText = Math.round(tongTien).toLocaleString('vi-VN');
            document.getElementById('tienMoiNguoi').innerText = tienLamTron.toLocaleString('vi-VN');

            // Hiện box kết quả với hiệu ứng mượt
            const box = document.getElementById('ketQuaBox');
            box.classList.remove('hidden');
            
            // Đợi bàn phím đóng hẳn rồi mới scroll mượt
            setTimeout(() => {
                box.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }, 100);
        }
    </script>
</body>

</html>
